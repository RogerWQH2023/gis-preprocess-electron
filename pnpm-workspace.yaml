packages:
  - "."

allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
  gdal-async: true

minimumReleaseAgeExclude:
  - '@cesium/engine@26.1.0'
  - '@cesium/widgets@16.1.0'
  - cesium@1.143.0

onlyBuiltDependencies:
  - electron
  - electron-builder
  - electron-winstaller
  - esbuild
  - gdal-async

overrides:
  "@electron/get": "3.1.0"
patchedDependencies:
  gdal-async@3.11.5: patches/gdal-async@3.11.5.patch
